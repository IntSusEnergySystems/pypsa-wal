# NIC5 cluster overrides (merged by `nic5.sh solve` via --configfile).
# Local config/config.walloon.yaml is unchanged.
#
# Solve jobs run on the `hmem` partition (see cluster/config.sh). At fine
# temporal resolution (e.g. clustering.temporal.resolution_sector: 6h) the
# sector-coupled LP can require hundreds of GB to ~1 TB RAM during Gurobi model
# build. Request the hmem node limit here (~1 000 000 MB on NIC5).
#
# Keep solving.cpus / gurobi-default.threads in sync with each other and with
# the Slurm cpus-per-task set in `nic5.sh solve`.
solving:
  mem_mb: 1000000
  cpus: &cluster_cpus 16
  solver_options:
    gurobi-default:
      threads: *cluster_cpus
